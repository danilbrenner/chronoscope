services:
  postgres:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    container_name: chronoscope-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: chronoscope_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - chronoscope-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chronoscope_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chronoscope-postgres-data:
